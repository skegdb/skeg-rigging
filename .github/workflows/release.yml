name: Release

# Tag pattern `v*` triggers a full workspace publish to crates.io in
# dependency order:
#
#   skeg-rigging  ->  skeg-rigging-skeg
#                 ->  skeg-rigging-ingest
#
# A short sleep between sibling publishes lets the new version reach the
# crates.io index before the next crate is verified. A re-run against an
# already-published version is a no-op.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the actual cargo publish (verify only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo publish skeg-rigging
        working-directory: crates/skeg-rigging
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            out=$(cargo publish --locked 2>&1) || \
              echo "$out" | grep -qE 'already (uploaded|exists)' || { echo "$out"; exit 1; }
          fi

      - name: wait for crates.io index propagation
        if: ${{ inputs.dry_run != true }}
        run: sleep 45

      - name: cargo publish skeg-rigging-skeg
        working-directory: crates/skeg-rigging-skeg
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            out=$(cargo publish --locked 2>&1) || \
              echo "$out" | grep -qE 'already (uploaded|exists)' || { echo "$out"; exit 1; }
          fi

      - name: cargo publish skeg-rigging-ingest
        working-directory: crates/skeg-rigging-ingest
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            out=$(cargo publish --locked 2>&1) || \
              echo "$out" | grep -qE 'already (uploaded|exists)' || { echo "$out"; exit 1; }
          fi
